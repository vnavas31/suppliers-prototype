<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplifae · Document Viewer</title>
  <style>
    :root {
      --ink: #17233a;
      --muted: #667892;
      --soft: #eef4f7;
      --line: #dbe5ee;
      --line-strong: #c8d6e3;
      --teal: #18cbc3;
      --teal-dark: #087c77;
      --teal-soft: #e8fbf8;
      --navy: #08132d;
      --danger: #a33a1b;
      --paper: #ffffff;
      --wash: #eef5f8;
      --shadow: 0 18px 46px rgba(8, 19, 45, .10);
      --refs-width: 23rem;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(24, 203, 195, .13), transparent 35rem),
        linear-gradient(180deg, #f8fbfd 0%, var(--wash) 100%);
    }

    button, select { font: inherit; }

    .viewer-shell {
      height: 100vh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .tender-strip {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: auto minmax(12rem, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 66px;
      padding: 10px 18px;
      background: rgba(255,255,255,.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .tender-strip-left {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      white-space: nowrap;
    }

    .match-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid #bfeee9;
      color: var(--teal-dark);
      background: var(--teal-soft);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      flex: 0 0 auto;
    }

    .ref-chip {
      height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #5c6f88;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .01em;
      flex: 0 0 auto;
    }

    .tender-title {
      min-width: 0;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      white-space: nowrap;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--line);
      color: #6a7c94;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .16s ease, color .16s ease, transform .16s ease, background .16s ease;
      flex: 0 0 auto;
    }

    .icon-btn svg { width: 17px; height: 17px; }
    .icon-btn:hover {
      color: var(--teal-dark);
      border-color: #bfeee9;
      background: #f6fffd;
      transform: translateY(-1px);
    }
    .icon-btn.is-active {
      color: var(--teal-dark);
      border-color: #aee9e4;
      background: var(--teal-soft);
    }

    .action-separator {
      width: 1px;
      height: 32px;
      background: var(--line);
      margin: 0 4px;
      flex: 0 0 auto;
    }

    .decision-btn {
      height: 38px;
      border-radius: 999px;
      padding: 0 18px;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: #34445d;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .decision-btn.go {
      min-width: 76px;
      border-color: var(--teal);
      color: #06223a;
      background: linear-gradient(180deg, #25d6cf 0%, #16c8c0 100%);
      box-shadow: 0 16px 32px rgba(24, 203, 195, .22);
    }

    .document-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(18rem, 28rem);
      gap: 12px;
      align-items: center;
      min-height: 64px;
      padding: 8px 16px;
      background: rgba(255,255,255,.82);
      border-bottom: 1px solid var(--line);
    }

    .doc-card {
      min-width: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .doc-summary-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
    }

    .doc-main {
      min-width: 0;
      flex: 1 1 auto;
    }

    .doc-meta {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 8px;
      max-width: 100%;
      min-width: 13rem;
      padding-left: 16px;
      border-left: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 780;
      white-space: nowrap;
      overflow: hidden;
    }

    .doc-meta span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-meta span:not(:last-child)::after {
      content: "·";
      margin-left: 8px;
      color: #a7b3c2;
    }

    .document-header-shell {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(18rem, 28rem);
      gap: 12px;
      align-items: center;
      border: 1px solid #d7e3ed;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(250,253,254,.9));
      box-shadow: 0 8px 24px rgba(8, 19, 45, .045);
      padding: 8px 12px 8px 14px;
    }

    .doc-eyebrow {
      color: #8291a5;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .11em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .doc-title {
      font-size: 17px;
      line-height: 1.15;
      font-weight: 950;
      letter-spacing: -.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doc-control-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .doc-select {
      height: 40px;
      width: 100%;
      border-radius: 15px;
      border: 1px solid #cad8e5;
      background: rgba(255,255,255,.92);
      color: var(--ink);
      padding: 0 12px;
      font-weight: 850;
      font-size: 13px;
      outline: none;
      min-width: 0;
    }

    .active-ref {
      height: 34px;
      display: inline-flex;
      align-items: center;
      max-width: 13rem;
      padding: 0 11px;
      border-radius: 999px;
      background: #f7fafc;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(17rem, var(--refs-width)) 12px minmax(0, 1fr);
      gap: 10px;
      padding: 18px 22px 22px;
      transition: grid-template-columns .2s ease;
    }

    body.resizing-panel {
      cursor: col-resize;
      user-select: none;
    }

    body.resizing-panel .viewer-main {
      transition: none;
    }

    .viewer-resizer {
      position: relative;
      width: 12px;
      height: 100%;
      align-self: stretch;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: col-resize;
      touch-action: none;
      opacity: .72;
      transition: opacity .16s ease;
    }

    .viewer-resizer:hover,
    .viewer-resizer:focus-visible,
    body.resizing-panel .viewer-resizer {
      opacity: 1;
      outline: none;
    }

    .viewer-resizer::before {
      content: "";
      position: absolute;
      top: 14px;
      bottom: 14px;
      left: 50%;
      width: 1px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, transparent 0%, #d8e5ed 14%, #c6d7e3 50%, #d8e5ed 86%, transparent 100%);
    }

    .viewer-resizer::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 34px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background:
        radial-gradient(circle, #9fb3c5 1.4px, transparent 1.6px) center 7px / 5px 8px repeat-y;
      box-shadow: 0 0 0 6px rgba(255,255,255,.62);
    }

    .references-panel {
      min-height: 0;
      height: 100%;
      max-height: none;
      align-self: stretch;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.94) 0%, rgba(249,252,253,.90) 100%),
        radial-gradient(circle at 0% 0%, rgba(24,203,195,.08), transparent 18rem);
      box-shadow: 0 20px 44px rgba(8, 19, 45, .08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      padding: 15px 16px 13px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(250,253,254,.72));
    }

    .panel-title {
      font-size: 15px;
      font-weight: 950;
      letter-spacing: -.015em;
    }

    .panel-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .ref-list {
      padding: 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 9px;
      scrollbar-gutter: stable;
      scroll-padding-block: 14px;
      background:
        linear-gradient(180deg, rgba(248,251,253,.34), rgba(238,245,248,.18)),
        repeating-linear-gradient(135deg, rgba(8,19,45,.012) 0, rgba(8,19,45,.012) 1px, transparent 1px, transparent 12px);
    }

    .ref-list::-webkit-scrollbar {
      width: 10px;
    }

    .ref-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .ref-list::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: #c5d4df;
      background-clip: content-box;
    }

    .ref-group {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(219, 229, 238, .72);
      border-radius: 15px;
      background: linear-gradient(180deg, rgba(255,255,255,.84), rgba(249,251,253,.78));
      padding: 11px 12px;
      color: var(--ink);
      box-shadow: 0 8px 22px rgba(8, 19, 45, .035);
      transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .ref-group.active {
      border-color: #aee9e4;
      background: linear-gradient(180deg, #f1fffc 0%, #eafbf8 100%);
      box-shadow: inset 3px 0 0 var(--teal), 0 10px 24px rgba(8, 124, 119, .08);
    }

    .ref-group.scope {
      border-color: #c8eee8;
      background:
        linear-gradient(180deg, rgba(244,255,252,.96), rgba(250,254,253,.86)),
        radial-gradient(circle at 100% 0%, rgba(24,203,195,.11), transparent 14rem);
    }

    .ref-kicker {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--teal-dark);
      font-size: 9.5px;
      font-weight: 950;
      letter-spacing: .13em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .ref-kicker span:last-child {
      color: #7e8fa2;
    }

    .ref-label {
      font-size: 13px;
      font-weight: 860;
      line-height: 1.28;
      letter-spacing: -.006em;
    }

    .ref-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .ref-section-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8090a3;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .11em;
      text-transform: uppercase;
      padding: 4px 2px 2px;
    }

    .ref-section-divider::before,
    .ref-section-divider::after {
      content: "";
      height: 1px;
      background: #dbe6ee;
      flex: 1 1 auto;
    }

    .ref-source-chip {
      appearance: none;
      border: 1px solid #dce7ef;
      border-radius: 999px;
      background: rgba(255,255,255,.84);
      color: var(--teal-dark);
      cursor: pointer;
      padding: 5px 8px;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .02em;
      line-height: 1;
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }

    .ref-source-chip:hover,
    .ref-source-chip.active {
      border-color: var(--teal);
      background: #effffd;
      color: #055f5a;
    }

    .pdf-stage {
      min-width: 0;
      height: 100%;
      min-height: 0;
      max-height: none;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pdf-bar {
      min-height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      background: #fbfdfe;
    }

    .pdf-scroll {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      background: #f7fafc;
      overflow: auto;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }

    .pdf-pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 28px 22px 38px;
      min-height: 100%;
    }

    .pdf-page {
      position: relative;
      width: min(100%, 1120px);
      aspect-ratio: 2480 / 3510;
      min-height: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 34px rgba(8, 19, 45, .13);
      outline: 1px solid rgba(200, 214, 227, .75);
      scroll-margin-top: 24px;
    }

    .pdf-page::before {
      content: attr(data-page-label);
      position: absolute;
      top: 10px;
      right: 12px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      color: #6c7d94;
      font-size: 10px;
      font-weight: 850;
      box-shadow: 0 4px 12px rgba(8, 19, 45, .08);
      opacity: .75;
    }

    .pdf-page img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .pdf-page.loading {
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .pdf-page.error {
      align-items: center;
      padding: 40px;
      color: #9f3412;
      font-size: 13px;
      font-weight: 850;
      background: #fff7ed;
    }

    .pdf-loading {
      display: grid;
      gap: 8px;
      place-items: center;
      min-height: 28rem;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .pdf-loading::before {
      content: "";
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid #d8e6ed;
      border-top-color: var(--teal);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .viewer-shell {
        height: auto;
      }

      .tender-strip {
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 8px;
        padding: 8px 10px;
      }

      .match-chip { height: 30px; padding: 0 9px; font-size: 11px; }
      .ref-chip { display: none; }
      .tender-title { font-size: 12px; }
      .icon-btn { width: 31px; height: 31px; }
      .decision-btn { height: 32px; padding: 0 10px; font-size: 12px; }
      .decision-btn.go { min-width: 58px; }
      .action-separator { height: 27px; margin: 0 1px; }

      .document-header {
        grid-template-columns: 1fr;
        padding: 10px 12px;
      }

      .document-header-shell {
        grid-template-columns: minmax(0, 1fr) minmax(13rem, 20rem);
        gap: 10px;
      }

      .doc-summary-card {
        align-items: center;
      }

      .doc-meta {
        display: none;
      }

      .doc-title { font-size: 16px; }

      .viewer-main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .viewer-resizer {
        display: none;
      }

      .references-panel {
        height: auto;
      }

      .references-panel { max-height: 48vh; }
      .pdf-stage {
        height: 70vh;
        min-height: 520px;
        max-height: none;
      }
      .pdf-scroll { min-height: 0; }
      .pdf-pages { padding: 18px 12px 28px; }
    }

    @media (max-width: 640px) {
      .viewer-actions { gap: 5px; }
      .icon-btn { width: 29px; height: 29px; }
      .icon-btn svg { width: 15px; height: 15px; }
      .decision-btn { padding: 0 9px; }
      .tender-strip-left { gap: 6px; }
      .match-chip span:last-child { display: none; }
      .pdf-stage {
        height: 68vh;
        min-height: 430px;
      }
      .doc-summary-card { display: block; }
      .doc-meta {
        border-left: 0;
        padding-left: 0;
        margin-top: 6px;
        max-width: 100%;
      }
      .doc-control-card {
        grid-template-columns: 1fr;
      }
      .active-ref {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="viewer-shell">
    <header class="tender-strip" aria-label="Tender context">
      <div class="tender-strip-left">
        <span class="match-chip"><strong>96%</strong> <span>match</span></span>
        <span class="ref-chip">B41632266-2026/000071-PaA</span>
      </div>
      <div class="tender-title" title="Water and sanitation infrastructure works — Aguas de Huesna SL.">Water and sanitation infrastructure works — Aguas de Huesna SL...</div>
      <div class="viewer-actions" aria-label="Tender actions">
        <button class="icon-btn" id="favorite-btn" title="Add to favourites" aria-label="Add to favourites" onclick="toggleActive(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 0 1 7.1-7.1l.4.4.4-.4a5 5 0 0 1 7.1 7.1Z"/></svg>
        </button>
        <button class="icon-btn" title="Copy tender link" aria-label="Copy tender link" onclick="copyViewerLink()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="icon-btn" id="seen-btn" title="Mark as unread" aria-label="Mark as unread" onclick="toggleSeen(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 10.6A2 2 0 0 0 13.4 13.4"/><path d="M9.9 4.24A10.6 10.6 0 0 1 12 4c6.5 0 10 8 10 8a18.5 18.5 0 0 1-3.1 4.5"/><path d="M6.6 6.7A18 18 0 0 0 2 12s3.5 8 10 8a10.7 10.7 0 0 0 4.3-.9"/></svg>
        </button>
        <button class="icon-btn" title="View source in a new tab" aria-label="View source in a new tab" onclick="openSource()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        </button>
        <span class="action-separator" aria-hidden="true"></span>
        <button class="decision-btn go" onclick="setDecision('Go')">Go</button>
        <button class="decision-btn" onclick="setDecision('No Go')">No Go</button>
      </div>
    </header>

    <section class="document-header" aria-label="Document header">
      <div class="document-header-shell">
        <div class="doc-card doc-summary-card">
          <div class="doc-main">
            <div class="doc-eyebrow">Document viewer</div>
            <div class="doc-title" id="doc-title">PCAP — Administrative Clauses</div>
          </div>
          <div class="doc-meta" id="doc-meta"></div>
        </div>
        <div class="doc-card doc-control-card">
          <select class="doc-select" id="doc-select" aria-label="Change document" onchange="selectDocument(this.value)"></select>
          <div class="active-ref" id="active-ref">PCAP · p. 8</div>
        </div>
      </div>
    </section>

    <main class="viewer-main">
      <aside class="references-panel" aria-label="Evidence references">
        <div class="panel-head">
          <div>
            <div class="panel-title">Tender evidence</div>
            <div class="panel-sub">Use references to jump to the exact source page.</div>
          </div>
        </div>

      } else {
        scrollToPage(activePage);

      document.getElementById('pdf-location').textContent = `${doc.short} · p. ${activePage}`;

      renderReferences();
      const url = new URL(window.location.href);
      url.searchParams.set('doc', activeDocKey);
      url.searchParams.set('page', String(activePage));
      url.searchParams.set('tender', activeTenderKey);
      window.history.replaceState({}, '', url.toString());

    function pageImagePath(doc, pageNumber) {
      return `${doc.pageDir}/page-${String(pageNumber).padStart(3, '0')}.png`;
    }

    function loadDocumentPages(doc, page) {
      const pagesRoot = document.getElementById('pdf-pages');
      const currentRun = ++renderRunId;
      const scroller = document.getElementById('pdf-scroll');
      renderedDocKey = activeDocKey;
      scroller.dataset.currentPage = String(page);
      pagesRoot.innerHTML = '';
      pagesRoot.dataset.renderStatus = 'loading-pages';

      for (let pageNumber = 1; pageNumber <= doc.pageCount; pageNumber += 1) {
        const pageShell = document.createElement('article');
        pageShell.className = 'pdf-page loading';
        pageShell.id = `pdf-page-${pageNumber}`;
        pageShell.dataset.page = String(pageNumber);
        pageShell.dataset.pageLabel = `p. ${pageNumber}`;

        const image = document.createElement('img');
        image.src = pageImagePath(doc, pageNumber);
        image.alt = `${doc.short} page ${pageNumber}`;
        image.loading = Math.abs(pageNumber - page) <= 2 ? 'eager' : 'lazy';
        image.decoding = 'async';
        image.onload = () => {
          if (currentRun !== renderRunId) return;
          pageShell.classList.remove('loading');
          if (pageNumber === page) scrollToPage(page, { immediate: true });
        };
        image.onerror = () => {
          pageShell.className = 'pdf-page error';
          pageShell.textContent = `Unable to load ${doc.short} page ${pageNumber}`;
        };

        pageShell.appendChild(image);
        pagesRoot.appendChild(pageShell);
      }

      requestAnimationFrame(() => {
        scrollToPage(page, { immediate: true });
        requestAnimationFrame(() => scrollToPage(page, { immediate: true }));
      });
      pagesRoot.dataset.renderStatus = 'complete';
    }

    function scrollToPage(page, options = {}) {
      const target = document.getElementById(`pdf-page-${page}`);
      if (!target) return;
      const scroller = document.getElementById('pdf-scroll');
      const scrollerRect = scroller.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const top = Math.max(0, scroller.scrollTop + targetRect.top - scrollerRect.top - 18);
      scroller.dataset.currentPage = String(page);
      scroller.scrollTo({
        top,
        behavior: options.immediate ? 'auto' : 'smooth'
      });
    }

    function renderReferences() {
      const list = document.getElementById('ref-list');
      const groupedRefs = getActiveEvidenceRefs().reduce((groups, ref) => {
        const key = `${ref.type}::${ref.label}`;
        if (!groups.has(key)) {
          groups.set(key, {
            type: ref.type,
            label: ref.label,
            refs: []
          });
        }
        groups.get(key).refs.push(ref);
        return groups;
      }, new Map());

      const groups = [...groupedRefs.values()];
      list.innerHTML = groups.map((group, index) => {
        const isActiveGroup = group.refs.some(ref => ref.docKey === activeDocKey && ref.page === activePage);
        const isScopeGroup = group.type.toLowerCase().includes('scope');
        const sources = group.refs.map(ref => {
          const isActiveSource = ref.docKey === activeDocKey && ref.page === activePage;
          const source = ref.source || `${DOCS[ref.docKey] ? DOCS[ref.docKey].short : ref.docKey} · p. ${ref.page}`;
          return `
            <button class="ref-source-chip ${isActiveSource ? 'active' : ''}" data-doc="${escapeForHtml(ref.docKey)}" data-page="${ref.page}" onclick="goToReference('${escapeForAttr(ref.docKey)}', ${ref.page}, '${escapeForAttr(ref.label)}')" title="Open ${escapeForHtml(source)}">
              ${escapeForHtml(source)}
            </button>
          `;
        }).join('');
        const nextGroup = groups[index + 1];
        const needsCriteriaDivider = isScopeGroup && nextGroup && !nextGroup.type.toLowerCase().includes('scope');

        return `
          <article class="ref-group ${isScopeGroup ? 'scope' : ''} ${isActiveGroup ? 'active' : ''}">
            <div class="ref-kicker"><span>${escapeForHtml(group.type)}</span><span>${group.refs.length} ${group.refs.length === 1 ? 'source' : 'sources'}</span></div>
            <div class="ref-label">${escapeForHtml(group.label)}</div>
            <div class="ref-sources">${sources}</div>
          </article>
          ${needsCriteriaDivider ? '<div class="ref-section-divider"><span>Criteria evidence</span></div>' : ''}
        `;
      }).join('');
      const activeItem = list.querySelector('.ref-group.active');
      if (activeItem) activeItem.scrollIntoView({ block: 'center' });
    }

    function selectDocument(docKey) {
      const activeDocKeys = getActiveDocKeys();

      activePage = DOCS[activeDocKey].defaultPage;
      renderDocument({ reloadPdf: true });
    }

    function goToReference(docKey, page, label) {
      const activeDocKeys = getActiveDocKeys();
      const nextDocKey = DOCS[docKey] && activeDocKeys.includes(docKey) ? docKey : activeDocKey;
      const shouldReload = nextDocKey !== activeDocKey;
      activeDocKey = nextDocKey;
      activePage = Math.min(page, DOCS[activeDocKey].pageCount);
      renderDocument({ reloadPdf: shouldReload });
      if (!shouldReload) requestAnimationFrame(() => scrollToPage(activePage));
      document.getElementById('active-ref').textContent = `${DOCS[activeDocKey].short} · p. ${activePage}`;
      document.getElementById('pdf-stage').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    function handleExternalViewerNavigation(payload) {
      if (!payload || payload.type !== 'simplifae:viewer:navigate') return;
      const payloadTenderKey = sanitizeViewerKey(payload.tenderKey || activeTenderKey);
      if (payloadTenderKey) {
        activeTenderKey = payloadTenderKey;
        window.name = 'simplifae-viewer-' + activeTenderKey;
        buildDocSelect();
        renderedDocKey = null;
      }
      const activeDocKeys = getActiveDocKeys();
      const docKey = DOCS[payload.docKey] && activeDocKeys.includes(payload.docKey) ? payload.docKey : getDefaultDocKey();
      const page = Number(payload.page);
      if (!Number.isFinite(page) || page < 1) return;
      goToReference(docKey, Math.min(page, DOCS[docKey].pageCount), payload.label || '');
      try {
        window.focus();
      } catch (err) {
        // Browser focus is best-effort; the opener also calls focus from the user gesture.
      }
    }

    function setupExternalViewerControl() {
      window.addEventListener('message', event => {
        handleExternalViewerNavigation(event.data);
      });

      try {
        if ('BroadcastChannel' in window) {
          viewerBroadcastChannel = new BroadcastChannel(VIEWER_CHANNEL_NAME);
          viewerBroadcastChannel.onmessage = event => handleExternalViewerNavigation(event.data);
        }
      } catch (err) {
        viewerBroadcastChannel = null;
      }

      window.addEventListener('storage', event => {
        if (event.key !== 'simplifae.viewer.command' || !event.newValue) return;
        try {
          handleExternalViewerNavigation(JSON.parse(event.newValue));
        } catch (err) {
          // Ignore malformed cross-tab messages.
        }
      });
    }

    function escapeForAttr(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function escapeForHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function toggleActive(btn) {
      btn.classList.toggle('is-active');
    }

    function toggleSeen(btn) {
      btn.classList.toggle('is-active');
      btn.title = btn.classList.contains('is-active') ? 'Marked as unread' : 'Mark as unread';
    }

    async function copyViewerLink() {
      try {
        await navigator.clipboard.writeText(window.location.href);
      } catch (err) {
        window.prompt('Copy tender link', window.location.href);
      }
    }

    function openSource() {
      alert('This would open the original tender source in a new browser tab.');
    }

    function getReferencePanelBounds() {
      const rootSize = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
      const viewportWidth = window.innerWidth || document.documentElement.clientWidth;
      return {
        min: Math.round(rootSize * 17),
        max: Math.min(Math.round(rootSize * 34), Math.round(viewportWidth * .42))
      };
    }

    function setReferencePanelWidth(width, options = {}) {
      const { min, max } = getReferencePanelBounds();
      const nextWidth = Math.max(min, Math.min(max, Math.round(width)));
      document.documentElement.style.setProperty('--refs-width', `${nextWidth}px`);
      const resizer = document.getElementById('viewer-resizer');
      if (resizer) {
        resizer.setAttribute('aria-valuemin', String(min));
        resizer.setAttribute('aria-valuemax', String(max));
        resizer.setAttribute('aria-valuenow', String(nextWidth));
      }
      if (options.persist !== false) {
        try {
          localStorage.setItem('simplifae.viewer.refsWidth', String(nextWidth));
        } catch (err) {
          // Width persistence is a convenience only.
        }
      }
    }

    function initReferenceResizer() {
      const resizer = document.getElementById('viewer-resizer');
      const panel = document.querySelector('.references-panel');
      if (!resizer || !panel) return;

      resizer.setAttribute('role', 'separator');
      resizer.setAttribute('aria-valuetext', 'Evidence panel width');

      try {
        const storedWidth = Number(localStorage.getItem('simplifae.viewer.refsWidth'));
        if (Number.isFinite(storedWidth) && storedWidth > 0) {
          setReferencePanelWidth(storedWidth, { persist: false });
        } else {
          setReferencePanelWidth(panel.getBoundingClientRect().width || 368, { persist: false });
        }
      } catch (err) {
        setReferencePanelWidth(panel.getBoundingClientRect().width || 368, { persist: false });
      }

      let startX = 0;
      let startWidth = 0;

      const stopResize = event => {
        document.body.classList.remove('resizing-panel');
        window.removeEventListener('pointermove', moveResize);
        window.removeEventListener('pointerup', stopResize);
        window.removeEventListener('pointercancel', stopResize);
        if (event && typeof resizer.releasePointerCapture === 'function') {
          try { resizer.releasePointerCapture(event.pointerId); } catch (err) {}
        }
      };

      const moveResize = event => {
        setReferencePanelWidth(startWidth + event.clientX - startX);
      };

      resizer.addEventListener('pointerdown', event => {
        if (window.matchMedia('(max-width: 900px)').matches) return;
        startX = event.clientX;
        startWidth = panel.getBoundingClientRect().width;
        document.body.classList.add('resizing-panel');
        if (typeof resizer.setPointerCapture === 'function') {
          try { resizer.setPointerCapture(event.pointerId); } catch (err) {}
        }
        window.addEventListener('pointermove', moveResize);
        window.addEventListener('pointerup', stopResize);
        window.addEventListener('pointercancel', stopResize);
      });

      resizer.addEventListener('keydown', event => {
        if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') return;
        event.preventDefault();
        const direction = event.key === 'ArrowRight' ? 1 : -1;
        setReferencePanelWidth(panel.getBoundingClientRect().width + direction * 24);
      });

      window.addEventListener('resize', () => {
        setReferencePanelWidth(panel.getBoundingClientRect().width, { persist: false });
      });
    }

    function setDecision(decision) {
      alert(`${decision} decision saved for this tender.`);
    }

    pageFromParams();
    buildDocSelect();
    setupExternalViewerControl();
    initReferenceResizer();
    renderDocument({ reloadPdf: true });
  </script>
</body>
</html>
